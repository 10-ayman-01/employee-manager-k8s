apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      automountServiceAccountToken: false
      containers:
        - name: db
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: employeedb
            - name: POSTGRES_USER
              value: empuser
            # Vulnerabilidad existente: contraseña en texto plano en manifiesto
            - name: POSTGRES_PASSWORD
              value: emppass
            # CORRECCIÓN: se redirige PGDATA fuera de directorios del SO
            - name: PGDATA
              value: /data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          # CORRECCIÓN: se evita escalada de privilegios
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: postgres-storage
              # CORRECCIÓN: se usa ruta personalizada fuera de directorios del SO
              mountPath: /data/pgdata
              subPath: pgdata
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc