<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
  </svg>
  <h1>Employee Manager</h1>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="total-count">0</div>
      <div class="label">Total empleados</div>
    </div>
    <div class="stat-card">
      <div class="num" id="dept-count">0</div>
      <div class="label">Departamentos</div>
    </div>
    <div class="stat-card">
      <div class="num" id="avg-salary">0</div>
      <div class="label">Salario medio (€)</div>
    </div>
  </div>

  <div class="card">
    <h2>Nuevo empleado</h2>
    <div class="form-grid">
      <input type="text"   id="name"       placeholder="Nombre completo" />
      <input type="email"  id="email"      placeholder="Email corporativo" />
      <select id="department">
        <option value="">Departamento</option>
        <option>Engineering</option>
        <option>Marketing</option>
        <option>HR</option>
        <option>Finance</option>
        <option>Sales</option>
      </select>
      <input type="text"   id="position"   placeholder="Cargo" />
      <input type="number" id="salary"     placeholder="Salario anual (€)" />
      <div class="form-action">
        <button class="btn btn-primary" onclick="createEmployee()">Añadir empleado</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Plantilla</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Departamento</th>
            <th>Cargo</th>
            <th>Salario</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="employees-table"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Editar empleado</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-grid">
      <input type="text"   id="edit-name"       placeholder="Nombre completo" />
      <input type="email"  id="edit-email"      placeholder="Email" />
      <select id="edit-department">
        <option>Engineering</option>
        <option>Marketing</option>
        <option>HR</option>
        <option>Finance</option>
        <option>Sales</option>
      </select>
      <input type="text"   id="edit-position"   placeholder="Cargo" />
      <input type="number" id="edit-salary"     placeholder="Salario" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary"   onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
